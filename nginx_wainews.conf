server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wainews.com.br www.wainews.com.br;

    ssl_certificate /etc/ssl/wainews/origin.crt;
    ssl_certificate_key /etc/ssl/wainews/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    location = /webhooks/dispatch/whatsapp {
        limit_except POST { deny all; }
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:8788/dispatch/whatsapp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    # New - Groups Extraction Endpoints
    location = /webhooks/gateway/groups {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8788/groups;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/webhooks/gateway/groups/([^/]+)/participants$ {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8788/groups/$1/participants;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /generated/ {
        alias /var/www/wainews/public/generated/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Served-By "nginx-static" always;
        error_page 404 = @generated_404;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }

    location @generated_404 {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Served-By "nginx-static-miss" always;
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name wainews.com.br www.wainews.com.br;

    # Gateway API over HTTP — for Cloudflare Worker direct access
    location = /webhooks/gateway/groups {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8788/groups;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/webhooks/gateway/groups/([^/]+)/participants$ {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8788/groups/$1/participants;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dispatch also over HTTP for Worker access
    location = /webhooks/dispatch/whatsapp {
        limit_except POST { deny all; }
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:8788/dispatch/whatsapp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
